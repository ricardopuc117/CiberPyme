{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="login-container">
    <div class="login-wrapper" style="max-width: 600px;">
        <div class="glass-card login-card animate__animated animate__fadeIn">
            
            <div class="login-header text-center mb-4">
                <div class="mb-3">
                    <i class="bi bi-building-check fs-1 text-gradient"></i>
                </div>
                <h2 class="text-gradient h1 fw-bold">Acceso Corporativo</h2>
                <p class="text-muted">Únete a la red de empresas protegidas por CyberPyme</p>
            </div>

            <form method="post" class="needs-validation" id="registroForm">
                {% csrf_token %}

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="text" name="nombre_empresa" id="id_nombre_empresa" class="form-control" placeholder=" " required>
                            <label for="id_nombre_empresa">Nombre de la Empresa</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="text" name="nombre_contacto" id="id_nombre_contacto" class="form-control" placeholder=" " required>
                            <label for="id_nombre_contacto">Nombre del Contacto</label>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="email" name="email" id="id_email" class="form-control" placeholder=" " required>
                            <label for="id_email">Correo Electrónico Corporativo</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="text" name="rfc" id="id_rfc" class="form-control" placeholder=" " required 
                                pattern="^[A-Z&]{3,4}\d{6}[A-Z0-9]{3}$" title="Formato de RFC invlido">
                            <label for="id_rfc">RFC de la Empresa</label>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="text" name="username" id="id_username" class="form-control" placeholder=" " required>
                            <label for="id_username">Nombre de Usuario</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="tel" name="telefono" id="id_telefono" class="form-control" placeholder=" " required>
                            <label for="id_telefono">Teléfono de Contacto</label>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="password" name="password" id="id_password" class="form-control" placeholder=" " required>
                            <label for="id_password">Contraseña</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="password" name="confirm_password" id="id_confirm_password" class="form-control" placeholder=" " required>
                            <label for="id_confirm_password">Confirmar Contraseña</label>
                        </div>
                    </div>
                </div>

                <div class="form-floating mb-4">
                    <textarea name="mensaje" id="id_mensaje" class="form-control" placeholder=" " style="height: 100px"></textarea>
                    <label for="id_mensaje">Cuéntanos sobre tu empresa (opcional)</label>
                </div>

                <button type="submit" class="btn btn-custom w-100 py-3 d-flex align-items-center justify-content-center gap-2">
                    Registrarse e Ingresar <i class="bi bi-arrow-right-circle-fill"></i>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small mb-0">¿Ya tienes cuenta?</p>
                <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color: var(--text);">Volver al inicio de sesión</a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
